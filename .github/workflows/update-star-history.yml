name: Update star history assets

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star-history-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.STAR_HISTORY_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate GitHub API token
        shell: bash
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::Repository secret STAR_HISTORY_TOKEN is required to read Stargazers from another repository"
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check project
        run: pnpm check

      - name: Generate WebP charts
        run: pnpm generate

      - name: Commit generated assets
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- data generated)" ]]; then
            echo "No star history changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data generated
          git commit -m "chore: update star history assets"
          git push
